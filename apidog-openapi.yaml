  /api/v1/receipts/scan:
    post:
      summary: Scan receipt
      description: Scan a receipt image and extract transaction data using AI. Supports cascading fallback to OCR text if image vision fails.
      tags:
        - Receipts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Receipt image (JPEG or PNG, max 10MB)
                ocr_text:
                  type: string
                  description: Optional OCR text extracted locally (e.g., via ML Kit) for fallback parsing.
              required:
                - image
      responses:
        '200':
          description: Receipt scanned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
              example:
                data:
                  amount: 50000
                  currency: "IDR"
                  date: "2026-04-12"
                  merchant: "Restaurant Name"
                  category: "cat_food"
                  confidence: 95
        '501':
          description: Gemini API not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Gemini API key not configured"
