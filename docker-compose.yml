version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashlens
      POSTGRES_USER: cashlens
      POSTGRES_PASSWORD: cashlens_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashlens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
